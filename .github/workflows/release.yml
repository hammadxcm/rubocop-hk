name: Release (Manual)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.3'
        bundler-cache: true

    - name: Run full test suite
      run: bundle exec rspec

    - name: Run RuboCop
      run: bundle exec rubocop --parallel

  build-and-publish:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.3'
        bundler-cache: true

    - name: Extract version from tag
      id: extract_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Check if version already published
      id: check_version
      run: |
        VERSION="${{ steps.extract_version.outputs.VERSION }}"
        if gem search rubocop-hk --versions --exact | grep -q "$VERSION"; then
          echo "already_published=true" >> $GITHUB_OUTPUT
          echo "Version $VERSION already published (likely by auto-release)"
        else
          echo "already_published=false" >> $GITHUB_OUTPUT
        fi

    - name: Build gem
      if: steps.check_version.outputs.already_published == 'false'
      run: |
        gem build rubocop-hk.gemspec
        ls -la *.gem

    - name: Test gem installation
      if: steps.check_version.outputs.already_published == 'false'
      run: |
        gem install ./rubocop-hk-*.gem
        ruby -e "require 'rubocop/hk'; puts Rubocop::Hk::VERSION"

    - name: Publish to RubyGems
      if: steps.check_version.outputs.already_published == 'false'
      env:
        GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_AUTH_TOKEN }}
      run: |
        mkdir -p ~/.gem
        echo "---" > ~/.gem/credentials
        echo ":rubygems_api_key: $GEM_HOST_API_KEY" >> ~/.gem/credentials
        chmod 600 ~/.gem/credentials
        gem push rubocop-hk-*.gem --verbose

    - name: Create GitHub Release
      if: steps.check_version.outputs.already_published == 'false'
      uses: softprops/action-gh-release@v2
      with:
        files: |
          rubocop-hk-*.gem
        generate_release_notes: true
        make_latest: true

    - name: Skip notice
      if: steps.check_version.outputs.already_published == 'true'
      run: echo "Skipped - version already published by auto-release in CI"